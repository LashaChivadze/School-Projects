<!DOCTYPE html>
<html lang="ka">
<head>

    <title>გალერეა - აკაურთის ეკლესია</title>

<body>

    <nav class="navbar">
        <div class="container">

    <header class="page-header">

            <h1>ფოტოგალერეა</h1>

        </div>

    <!-- Main Content -->
    <main>
        <div class="container">
            <section class="gallery-section">
                <h2>ეკლესიის გარე ხედი</h2>
                <div class="gallery-grid">
                    <div class="gallery-item">
                        <img src="/images/firstiamge.jpg" alt="გამომწერი ხედი">
                    </div>
                    <div class="gallery-item">

                    <div class="gallery-item">
                        <img src="/images/Map.jpg" alt="დასავლეთი ხედი">
                    </div>
                    <div class="gallery-item">
                        <img src="/images/secondCross.jpg" alt="დასავლეთი ხედი">

            <div class="navigation-links">
                <a href="description.html" class="btn btn-secondary">← უკან დაბრუნება</a>
                <a href="index.html" class="btn btn-primary">მთავარი გვერდი</a>

        </div>

        <div class="container">
            <p>პროექტზე მუშაობდა<br>ლაშა ჩივაძე | სანდრო ხოშტარია | სანდრო შიუკაშვილი | გიორგი ცუხიშვილი | იოანე დემურიშვილი</p>
            <p>საქართველოს კულტურული მემკვიდრეობა</p>
        </div>
